# Deploy to GitHub Pages
name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: VITE_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} VITE_TMDB_ACCESS_TOKEN=${{ secrets.TMDB_ACCESS_TOKEN }} bun run build
      # SPA fallback: serve index.html for any 404 (client-side routing)
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
